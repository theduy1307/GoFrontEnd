name: CI/CD to Docker Hub

# This pipeline will be triggered when new code is pushed to the main or master branch.
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the source code from GitHub for the runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Docker Buildx (supports advanced build features and better caching).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub using the configured secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build a Docker image and push it to Docker Hub with the tag.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vue3-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vue3-app:${{ github.sha }}
          # Use GitHub caching to speed up builds for future iterations.
          cache-from: type=gha
          cache-to: type=gha,mode=max
